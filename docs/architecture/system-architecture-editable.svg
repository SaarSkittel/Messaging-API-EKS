<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1220" viewBox="0 0 1900 1220" role="img" aria-labelledby="title desc">
  <title id="title">Messaging API on Amazon EKS architecture</title>
  <desc id="desc">Editable SVG architecture diagram for the Messaging API Terraform and Helm deployment on Amazon EKS.</desc>

  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 32px Inter, Arial, sans-serif; fill: #111827; }
