      .infra-node { fill: #f8fafc; stroke: #64748b; }
      .traffic { fill: none; stroke: #2563eb; stroke-width: 3.2; }
      .grpc { fill: none; stroke: #059669; stroke-width: 3.2; stroke-dasharray: 10 8; }
      .dataflow { fill: none; stroke: #b45309; stroke-width: 3.2; }
      .secretflow { fill: none; stroke: #dc2626; stroke-width: 3.2; stroke-dasharray: 8 6; }
      .identity { fill: none; stroke: #475569; stroke-width: 3.2; stroke-dasharray: 6 6; }
      .icon { fill: none; stroke: #0f172a; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
