{{- if .Values.deployInternalAuthRedis }}
kind: PersistentVolume
apiVersion: v1
metadata:
  name: authentication-redis-pv
  labels:
    type: local
    app: redis
spec:
  storageClassName: standard
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  hostPath:
    path: /auth/redis
{{- end }}
