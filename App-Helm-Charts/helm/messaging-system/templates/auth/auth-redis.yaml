{{- if .Values.deployInternalAuthRedis }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: {{ .Values.authNamespace }}
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis/redis-stack-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - mountPath: /data
              name: redis-storage
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: authentication-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: {{ .Values.authNamespace }}
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
{{- end }}
