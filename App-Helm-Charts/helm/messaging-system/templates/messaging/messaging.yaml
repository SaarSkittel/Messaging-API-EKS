apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging
  namespace: {{ .Values.messagingNamespace }}
  labels:
    app: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messaging
  template:
    metadata:
      labels:
        app: messaging
    spec:
      {{- if .Values.useSecretsManager }}
      serviceAccountName: {{ .Values.messagingServiceAccountName }}
      {{- end }}
      containers:
        - name: messaging
          image: {{ .Values.messagingImage | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              {{- if .Values.useSecretsManager }}
              export POSTGRES_USERNAME="$(cat /mnt/secrets-store/postgres-username)"
              export POSTGRES_PASSWORD="$(cat /mnt/secrets-store/postgres-password)"
              export ACCESS_TOKEN="$(cat /mnt/secrets-store/access-token)"
              {{- end }}
              if [ "{{ .Values.useRedisTls }}" = "true" ]; then
                export CELERY_BROKER="rediss://${REDIS_HOST}:${REDIS_PORT}/0?ssl_cert_reqs=required"
                export CELERY_BACKEND="${CELERY_BROKER}"
              else
                export CELERY_BROKER="redis://${REDIS_HOST}:${REDIS_PORT}/0"
                export CELERY_BACKEND="${CELERY_BROKER}"
              fi
              python manage.py makemigrations && python manage.py makemigrations api && python manage.py migrate && gunicorn server.wsgi:application -b 0.0.0.0:8000
          ports:
            - containerPort: 8000
          env:
            {{- if not .Values.useSecretsManager }}
            - name: POSTGRES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: postgres-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: postgres-password
            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: access_token
            {{- end }}
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: django-config
                  key: postgres-port
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: django-config
                  key: postgres-host
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: django-config
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: django-config
                  key: redis-port
            - name: AUTH_GRPC_HOST
              value: "authentication-service.{{ .Values.authNamespace }}.svc.cluster.local:50051"
          {{- if .Values.useSecretsManager }}
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.messagingSecretProviderClassName }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: messaging-service
  namespace: {{ .Values.messagingNamespace }}
spec:
  type: NodePort
  selector:
    app: messaging
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
