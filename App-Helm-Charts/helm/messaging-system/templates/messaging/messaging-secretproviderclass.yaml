{{- if .Values.useSecretsManager }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.messagingSecretProviderClassName }}
  namespace: {{ .Values.messagingNamespace }}
spec:
  provider: aws
  parameters:
    usePodIdentity: "true"
    objects: |
      - objectName: "{{ .Values.accessTokenSecretArn }}"
        objectType: "secretsmanager"
        jmesPath:
          - path: "access_token"
            objectAlias: "access-token"
      - objectName: "{{ .Values.messagingDatabaseSecretArn }}"
        objectType: "secretsmanager"
        jmesPath:
          - path: "username"
            objectAlias: "postgres-username"
          - path: "password"
            objectAlias: "postgres-password"
{{- end }}
